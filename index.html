<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LioTil</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f4f6fb;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
display:grid;
grid-template-columns:320px auto;
grid-template-rows:auto auto;
column-gap:25px;
align-items:center;
}

.logo{
width:320px;
grid-row:1 / span 2;
}

.title{
font-size:72px;
color:#2c3458;
margin:0;
}

.subtitle{
font-size:28px;
color:#8a8f98;
margin-top:8px;
}

.footer{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
font-size:14px;
color:#888;
}

</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1 class="title">LioTil</h1>

<div class="subtitle">AI Tools & Data Systems</div>

</div>

<div class="footer">
© 2026 LioTil
</div>

</body>
</html>
